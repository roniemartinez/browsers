# https://taskfile.dev

version: '3'

tasks:
  install:
    cmds:
      - uv sync

  install-actions:
    cmds:
      - uv sync

  format:
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .

  lint:
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .
      - uv run mypy tests browsers

  test:
    cmds:
      - uv run pytest

  tag:
    vars:
      VERSION:
        sh: uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
    cmds:
      - git tag -s -a {{ .VERSION }} -m "Release {{ .VERSION }}"
